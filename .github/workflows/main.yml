name: RDP-Hacking-Setup
on:
  workflow_dispatch:
    inputs:
      username:
        description: 'اسم المستخدم'
        required: true
        default: 'AdminUser2026'
      password:
        description: 'كلمة المرور'
        required: true
        default: 'P@ssw0rd_Secure!99'
      tailscale_key:
        description: 'Tailscale Auth Key'
        required: true

jobs:
  setup-rdp:
    runs-on: windows-latest
    timeout-minutes: 360
    steps:
    - name: 🚀 تفعيل RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name 'fDenyTSConnections' -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name 'UserAuthentication' -Value 1
        echo "RDP Activated Successfully!"
        
    - name: 🔧 إنشاء مستخدم
      run: |
        $username = "${{ github.event.inputs.username }}"
        $password = "${{ github.event.inputs.password }}"
        net user $username $password /add /y
        net localgroup administrators $username /add
        echo "User Created: $username"

    - name: 🌐 إعداد Tailscale
      run: |
        # تحميل وتثبيت Tailscale
        Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
        Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/S" -Wait
        
        # تشغيل Tailscale وربط الحساب
        $auth_key = "${{ github.event.inputs.tailscale_key }}"
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey $auth_key
        echo "Tailscale is connected!"
        
    - name: 📥 تحميل أدوات الاختراق
      run: |
        Invoke-WebRequest -Uri "https://github.com/trustedsec/social-engineer-toolkit/archive/refs/heads/master.zip" -OutFile "set.zip" -ErrorAction SilentlyContinue
        Invoke-WebRequest -Uri "https://github.com/sqlmapproject/sqlmap/archive/refs/heads/master.zip" -OutFile "sqlmap.zip" -ErrorAction SilentlyContinue
        Invoke-WebRequest -Uri "https://github.com/lanmaster53/recon-ng/archive/refs/heads/master.zip" -OutFile "recon.zip" -ErrorAction SilentlyContinue
        Get-ChildItem *.zip | ForEach-Object { Expand-Archive -Path $_.Name -DestinationPath "." -Force -ErrorAction SilentlyContinue }
        echo "All Working Tools Downloaded!"
        
    - name: 📋 عرض بيانات الاتصال و Keep Alive
      run: |
        $ip = curl ifconfig.me
        $ts_ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        $username = "${{ github.event.inputs.username }}"
        $password = "${{ github.event.inputs.password }}"
        
        echo "✅ RDP Setup Complete!"
        echo "🔰 Public IP: $ip"
        echo "🔰 Tailscale IP: $ts_ip"
        echo "🔰 Username: $username"
        echo "🔰 Password: $password"
        echo "Good Job"
        
        # البقاء حياً لمدة 6 ساعات
        Start-Sleep -Seconds 21600
        
    - name: ⏰ إيقاف التشغيل
      run: |
        shutdown /s /t 10 /c "RDP Session Ended"
